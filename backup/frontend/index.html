<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv8 Object Detection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>YOLOv8 Object Detection</h1>
            <p>Upload an image to detect objects</p>
        </header>

        <main>
            <div class="upload-section">
                <div class="drop-zone" id="drop-zone">
                    <span class="drop-zone__prompt">Drag & Drop image here or click to upload</span>
                    <input type="file" name="file" id="file-input" class="drop-zone__input" accept="image/*">
                </div>
                
                <div class="preview-container hidden" id="preview-container">
                    <h3>Preview:</h3>
                    <img id="image-preview" src="" alt="Image Preview">
                </div>

                <button id="detect-btn" class="btn" disabled>Detect Objects</button>
                <div class="error-message" id="error-message"></div>
            </div>

            <div class="loading hidden" id="loading">
                <div class="spinner"></div>
                <p>Processing image...</p>
            </div>

            <div class="results-section hidden" id="results-section">
                <div class="result-card">
                    <h3>Processed Image</h3>
                    <img id="result-image" src="" alt="Processed Result">
                </div>
                
                <div class="result-card">
                    <h3>Detected Objects</h3>
                    <div class="table-container">
                        <table id="results-table">
                            <thead>
                                <tr>
                                    <th>Object</th>
                                    <th>Confidence</th>
                                </tr>
                            </thead>
                            <tbody id="results-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
